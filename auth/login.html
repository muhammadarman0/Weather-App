<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AeroWeather</title>
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="toast" class="toast"></div>

    <div class="auth-container glass-panel fade-in">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to access your AeroWeather dashboard.</p>
        </div>

        <form id="login-form" class="auth-form">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-primary">Login <i class="fa-solid fa-right-to-bracket"></i></button>
        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="social-login">
            <button type="button" class="btn-social google-btn" id="google-login">
                <i class="fa-brands fa-google"></i> Google
            </button>
            <button type="button" class="btn-social facebook-btn" id="fb-login">
                <i class="fa-brands fa-facebook-f"></i> Facebook
            </button>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
