<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Weather App</title>
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="./weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <div id="toast" class="toast"></div>

    <!-- Preloader -->
    <div id="preloader" class="preloader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-wrapper blur-bg hidden" id="dashboard">
        <!-- Navbar -->
        <nav class="navbar glass-panel">
            <a href="../index.html" class="nav-brand" style="text-decoration: none; color: white; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-cloud-bolt fa-bounce" style="color: var(--accent);"></i>
                <span>Weather App</span>
            </a>

            <div class="nav-controls">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="city-search" placeholder="Search City (e.g. London)..." autocomplete="off">
                </div>

                <div class="quick-select">
                    <select id="country-select">
                        <option value="" disabled selected>Quick Select</option>
                        <option value="Karachi">Pakistan (Karachi)</option>
                        <option value="London">United Kingdom (London)</option>
                        <option value="New York">USA (New York)</option>
                        <option value="Tokyo">Japan (Tokyo)</option>
                        <option value="Sydney">Australia (Sydney)</option>
                        <option value="Dubai">UAE (Dubai)</option>
                        <option value="Paris">France (Paris)</option>
                    </select>
                </div>

                <div class="user-menu">
                    <span id="user-greeting">Hi, User</span>
                    <button id="logout-btn" class="btn-logout" title="Logout">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Weather Main Area -->
        <main class="weather-container">
            <div class="weather-hero glass-panel fade-in">
                <div class="location-header">
                    <h1 id="city-name">Loading...</h1>
                    <p id="date-time">--</p>
                </div>

                <div class="current-weather">
                    <div class="temp-display">
                        <div style="display: flex; align-items: center; justify-content: flex-end; gap: 15px;">
                            <i id="main-weather-icon" class="fa-solid fa-cloud" style="font-size: 4rem;"></i>
                            <h2 id="current-temp">--°</h2>
                        </div>
                        <p id="weather-desc">Fetching weather...</p>
                    </div>
                </div>
            </div>

            <div class="weather-details grid fade-in" style="animation-delay: 0.2s;">
                <div class="detail-card glass-panel">
                    <i class="fa-solid fa-temperature-three-quarters"></i>
                    <h3>Feels Like</h3>
                    <p id="feels-like">--°</p>
                </div>
                <div class="detail-card glass-panel">
                    <i class="fa-solid fa-droplet"></i>
                    <h3>Humidity</h3>
                    <p id="humidity">--%</p>
                </div>
                <div class="detail-card glass-panel">
                    <i class="fa-solid fa-wind"></i>
                    <h3>Wind Speed</h3>
                    <p id="wind-speed">-- km/h</p>
                </div>
                <div class="detail-card glass-panel">
                    <i class="fa-solid fa-gauge"></i>
                    <h3>Pressure</h3>
                    <p id="pressure">-- hPa</p>
                </div>
            </div>

            <!-- New 24-Hour Forecast Section -->
            <div class="forecast-container glass-panel fade-in" style="animation-delay: 0.3s; margin-bottom: 20px;">
                <div class="forecast-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="font-weight: 600; font-size: 1.2rem;"><i class="fa-regular fa-clock"
                            style="margin-right: 8px;"></i>24-Hour Forecast</h3>
                </div>
                <div class="hourly-forecast" id="hourly-forecast">
                    <!-- Hourly items injected by JS -->
                </div>
            </div>

            <!-- New 7-Day Forecast Section -->
            <div class="forecast-container glass-panel fade-in" style="animation-delay: 0.35s;">
                <div class="forecast-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="font-weight: 600; font-size: 1.2rem;"><i class="fa-regular fa-calendar-days"
                            style="margin-right: 8px;"></i>7-Day Forecast</h3>
                </div>
                <div class="daily-forecast" id="daily-forecast">
                    <!-- Daily items injected by JS -->
                </div>
            </div>
        </main>

        <footer class="fade-in" style="animation-delay: 0.4s;">
            <p>Developed with ❤️ by <strong>Muhammad Arman</strong></p>
        </footer>
    </div>

    <script src="weather.js"></script>
</body>

</html>
